<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مولد QR Code مجاني - Adawix</title>
  <meta name="description" content="أنشئ رموز QR لروابط ونصوص ورسائل بريد وأرقام هاتف وشبكات WiFi مجاناً. تحميل PNG.">
  <link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/components.css"><link rel="stylesheet" href="/css/dark-mode.css"><link rel="stylesheet" href="/css/tools.css">
</head>
<body>
<main id="main-content">
  <div class="container"><nav class="breadcrumbs"><a href="/">الرئيسية</a><span class="sep">›</span><a href="/developer-tools/">أدوات المطورين</a><span class="sep">›</span><span class="current">مولد QR Code</span></nav></div>
  <section class="tool-page"><div class="container">
    <div class="tool-header"><h1>مولد QR Code</h1><p>أنشئ رمز QR لأي رابط أو نص أو بيانات. حمّله كصورة PNG.</p></div>
    <div class="tool-layout">
      <div class="tool-main"><div class="tool-box">
        <div style="margin-bottom:var(--sp-4)">
          <label class="tool-label">نوع المحتوى</label>
          <select id="qrType" class="tool-select">
            <option value="url">رابط (URL)</option>
            <option value="text">نص</option>
            <option value="email">بريد إلكتروني</option>
            <option value="phone">رقم هاتف</option>
            <option value="wifi">شبكة WiFi</option>
          </select>
        </div>
        <div id="qrFields" style="margin-bottom:var(--sp-4)"></div>
        <div class="grid-3" style="gap:var(--sp-4);margin-bottom:var(--sp-4)">
          <div><label class="tool-label">الحجم</label>
          <select id="qrSize" class="tool-select"><option value="128">صغير (128)</option><option value="256" selected>متوسط (256)</option><option value="512">كبير (512)</option></select></div>
          <div><label class="tool-label">لون الرمز</label><div class="color-wrap"><input type="color" id="qrFG" value="#000000"><span>اللون الأمامي</span></div></div>
          <div><label class="tool-label">لون الخلفية</label><div class="color-wrap"><input type="color" id="qrBG" value="#ffffff"><span>خلفية</span></div></div>
        </div>
        <div style="margin-bottom:var(--sp-4)">
          <label class="tool-label">مستوى تصحيح الخطأ</label>
          <select id="qrEC" class="tool-select"><option value="L">منخفض (L)</option><option value="M" selected>متوسط (M)</option><option value="Q">عالي (Q)</option><option value="H">مرتفع جداً (H)</option></select>
        </div>
        <button id="qrGenerate" class="btn btn-primary">⚡ توليد QR</button>
        <div class="qr-wrap mt-4" id="qrOutput"></div>
        <div class="tool-actions mt-4"><button id="qrDownloadPNG" class="btn btn-secondary" disabled>⬇ تحميل PNG</button></div>
      </div></div>
      <aside class="tool-sidebar"><div class="ad-container ad-rectangle"><div class="ad-placeholder">مساحة إعلانية 300×250</div></div></aside>
    </div>
  </div></section>
</main>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="/js/main.js"></script><script src="/js/tools/qr-generator.js"></script>
</body>
</html>
