<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منسق JSON وMُدقق - Adawix</title>
  <meta name="description" content="نسّق وتحقق من صحة JSON مجاناً مع إبراز بناء الجملة بالألوان. تصغير وتنسيق بنقرة واحدة.">
  <link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/components.css"><link rel="stylesheet" href="/css/dark-mode.css"><link rel="stylesheet" href="/css/tools.css">
</head>
<body>
<main id="main-content">
  <div class="container"><nav class="breadcrumbs"><a href="/">الرئيسية</a><span class="sep">›</span><a href="/developer-tools/">أدوات المطورين</a><span class="sep">›</span><span class="current">منسق JSON</span></nav></div>
  <section class="tool-page"><div class="container">
    <div class="tool-header"><h1>منسق JSON ومدقق</h1><p>الصق JSON وحدد العملية: تنسيق، تصغير، أو التحقق من الصحة.</p></div>
    <div class="tool-layout">
      <div class="tool-main"><div class="tool-box">
        <label class="tool-label">JSON الأصلي</label>
        <textarea id="jfInput" class="tool-textarea" style="min-height:200px;direction:ltr;text-align:left;font-family:var(--font-mono);font-size:.85rem" placeholder='{"key": "value", "number": 42}'></textarea>
        <div class="tool-actions" style="margin-top:var(--sp-4)">
          <button id="jfFormat"   class="btn btn-primary">🎨 تنسيق</button>
          <button id="jfMinify"   class="btn btn-secondary">📦 تصغير</button>
          <button id="jfValidate" class="btn btn-secondary">✅ تحقق</button>
          <button id="jfCopy"     class="btn btn-secondary">📋 نسخ</button>
          <button id="jfClear"    class="btn btn-secondary">🗑️ مسح</button>
        </div>
        <div id="jfError" hidden style="color:var(--error);font-size:.875rem;margin-top:var(--sp-2);font-family:var(--font-mono)"></div>
        <label class="tool-label mt-4">النتيجة</label>
        <pre id="jfOutput" class="json-output" style="min-height:200px"></pre>
      </div></div>
      <aside class="tool-sidebar"><div class="ad-container ad-rectangle"><div class="ad-placeholder">مساحة إعلانية 300×250</div></div></aside>
    </div>
  </div></section>
</main>
<script src="/js/main.js"></script><script src="/js/tools/json-formatter.js"></script>
</body>
</html>
