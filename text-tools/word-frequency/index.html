<main id="main-content">
  <div class="container"><nav class="breadcrumbs"><a href="/" data-i18n="bc.home">الرئيسية</a><span class="sep">›</span><a href="/text-tools/" data-i18n="bc.text-tools">أدوات النصوص</a><span class="sep">›</span><span class="current" data-i18n="tool.word-freq.bc">تكرار الكلمات</span></nav></div>
  <section class="tool-page"><div class="container">
    <div class="tool-header"><h1 data-i18n="tool.word-freq.title">عداد تكرار الكلمات</h1><p data-i18n="tool.word-freq.desc">الصق نصك وستحصل على جدول بتكرار كل كلمة ورسم بياني لأكثر 10 كلمات تكراراً.</p></div>
    <div class="tool-layout">
      <div class="tool-main"><div class="tool-box">
        <label class="tool-label" data-i18n="tool.word-freq.label">النص</label>
        <textarea id="wfInput" class="tool-textarea" placeholder="الصق نصك هنا..." data-i18n-ph="tool.word-freq.ph"></textarea>
        <div class="tool-actions" style="margin-top:var(--sp-4)">
          <button id="wfRun" class="btn btn-primary" data-i18n="tool.word-freq.btn">📊 تحليل</button>
          <select id="wfSort" class="tool-select"><option value="freq" data-i18n="tool.word-freq.opt-freq">ترتيب حسب التكرار</option><option value="alpha" data-i18n="tool.word-freq.opt-alpha">ترتيب أبجدي</option></select>
          <button id="wfCSV" class="btn btn-secondary" data-i18n="tool.word-freq.csv">⬇ تصدير CSV</button>
        </div>
        <div id="wfChart" style="margin:var(--sp-6) 0"></div>
        <div style="overflow-x:auto;margin-top:var(--sp-4)">
          <table class="data-table">
            <thead><tr><th data-i18n="tool.word-freq.th-num">#</th><th data-i18n="tool.word-freq.th-word">الكلمة</th><th data-i18n="tool.word-freq.th-count">العدد</th><th data-i18n="tool.word-freq.th-pct">النسبة</th></tr></thead>
            <tbody id="wfBody"></tbody>
          </table>
        </div>
      </div></div>
      <aside class="tool-sidebar"><div class="ad-container ad-rectangle"><div class="ad-placeholder"></div></div></aside>
    </div>
  </div></section>
