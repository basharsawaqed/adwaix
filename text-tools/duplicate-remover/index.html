<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مزيل النصوص المكررة - Adawix</title>
  <meta name="description" content="أداة مجانية لإزالة الأسطر والكلمات المكررة من أي نص عربي أو إنجليزي بنقرة واحدة.">
  <link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/components.css"><link rel="stylesheet" href="/css/dark-mode.css"><link rel="stylesheet" href="/css/tools.css">
</head>
<body>
<main id="main-content">
  <div class="container">
    <nav class="breadcrumbs"><a href="/">الرئيسية</a><span class="sep">›</span><a href="/text-tools/">أدوات النصوص</a><span class="sep">›</span><span class="current">مزيل التكرار</span></nav>
  </div>
  <section class="tool-page"><div class="container">
    <div class="tool-header"><h1>مزيل النصوص المكررة</h1><p>الصق نصك وحدد نوع الإزالة ثم اضغط "إزالة التكرار".</p></div>
    <div class="tool-layout">
      <div class="tool-main"><div class="tool-box">
        <label class="tool-label">النص الأصلي</label>
        <textarea id="drInput" class="tool-textarea" placeholder="الصق نصك هنا..."></textarea>
        <div class="tool-actions" style="margin-top:var(--sp-4)">
          <select id="drMode" class="tool-select"><option value="lines">إزالة الأسطر المكررة</option><option value="words">إزالة الكلمات المكررة</option></select>
          <label class="option-check"><input type="checkbox" id="drCase"> حساسية حالة الأحرف</label>
          <button id="drRun" class="btn btn-primary">🔄 إزالة التكرار</button>
          <button id="drClear" class="btn btn-secondary">مسح</button>
        </div>
        <div id="drCount" style="font-size:.85rem;color:var(--success);margin:var(--sp-2) 0;font-weight:600"></div>
        <label class="tool-label mt-4">النتيجة</label>
        <textarea id="drOutput" class="tool-textarea" readonly placeholder="ستظهر النتيجة هنا..."></textarea>
        <div class="tool-actions"><button id="drCopy" class="btn btn-secondary">📋 نسخ النتيجة</button></div>
      </div></div>
      <aside class="tool-sidebar"><div class="ad-container ad-rectangle"><div class="ad-placeholder">مساحة إعلانية 300×250</div></div></aside>
    </div>
  </div></section>
</main>
<script src="/js/main.js"></script><script src="/js/tools/duplicate-remover.js"></script>
</body>
</html>
