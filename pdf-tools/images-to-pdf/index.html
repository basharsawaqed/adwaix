<body>
<main id="main-content">
  <div class="container"><nav class="breadcrumbs"><a href="/" data-i18n="bc.home">الرئيسية</a><span class="sep">›</span><a href="/pdf-tools/" data-i18n="bc.pdf-tools">أدوات PDF</a><span class="sep">›</span><span class="current" data-i18n="tool.img2pdf.bc">صور إلى PDF</span></nav></div>
  <section class="tool-page"><div class="container">
    <div class="tool-header"><h1 data-i18n="tool.img2pdf.title">تحويل الصور إلى PDF</h1><p data-i18n="tool.img2pdf.desc">ارفع صوراً متعددة وحوّلها إلى ملف PDF واحد بخياراتك.</p></div>
    <div class="tool-layout">
      <div class="tool-main"><div class="tool-box">
        <div class="drop-zone" id="i2pDrop"><input type="file" id="i2pFile" accept="image/jpeg,image/png" multiple><div class="drop-icon">🖼️</div><h3>اسحب الصور هنا</h3><p>يدعم JPG وPNG — حد أقصى 50 MB لكل صورة</p></div>
        <div class="file-list" id="i2pList"></div>
        <div class="tool-actions" style="margin-top:var(--sp-4)">
          <div><label class="tool-label" data-i18n="tool.img2pdf.page">حجم الصفحة</label>
          <select id="i2pPage" class="tool-select"><option value="A4">A4</option><option value="Letter">Letter</option><option value="A3">A3</option></select></div>
          <div><label class="tool-label" data-i18n="tool.img2pdf.orient">الاتجاه</label>
          <select id="i2pOrient" class="tool-select"><option value="portrait" data-i18n="tool.img2pdf.opt-portrait">عمودي</option><option value="landscape" data-i18n="tool.img2pdf.opt-landscape">أفقي</option></select></div>
        </div>
        <div id="i2pProgress" hidden class="progress-wrap mt-4"><div class="progress-bar"><div class="progress-fill" id="i2pFill" style="width:0"></div></div><div class="progress-label">جاري التحويل...</div></div>
        <div class="tool-actions mt-4"><button id="i2pConvert" class="btn btn-primary" disabled data-i18n="tool.img2pdf.btn">📄 تحويل إلى PDF</button></div>
      </div></div>
      <aside class="tool-sidebar"><div class="ad-container ad-rectangle"><div class="ad-placeholder"></div></div></aside>
    </div>
  </div></section>
</main>
