<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تحويل الصور إلى PDF - Adawix</title>
  <meta name="description" content="حوّل مجموعة صور JPG وPNG إلى ملف PDF مجاناً. اختر حجم الصفحة واتجاهها.">
  <link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/components.css"><link rel="stylesheet" href="/css/dark-mode.css"><link rel="stylesheet" href="/css/tools.css">
</head>
<body>
<main id="main-content">
  <div class="container"><nav class="breadcrumbs"><a href="/">الرئيسية</a><span class="sep">›</span><a href="/pdf-tools/">أدوات PDF</a><span class="sep">›</span><span class="current">صور إلى PDF</span></nav></div>
  <section class="tool-page"><div class="container">
    <div class="tool-header"><h1>تحويل الصور إلى PDF</h1><p>ارفع صوراً متعددة وحوّلها إلى ملف PDF واحد بخياراتك.</p></div>
    <div class="tool-layout">
      <div class="tool-main"><div class="tool-box">
        <div class="drop-zone" id="i2pDrop"><input type="file" id="i2pFile" accept="image/jpeg,image/png" multiple><div class="drop-icon">🖼️</div><h3>اسحب الصور هنا</h3><p>يدعم JPG وPNG — حد أقصى 50 MB لكل صورة</p></div>
        <div class="file-list" id="i2pList"></div>
        <div class="tool-actions" style="margin-top:var(--sp-4)">
          <div><label class="tool-label">حجم الصفحة</label>
          <select id="i2pPage" class="tool-select"><option value="A4">A4</option><option value="Letter">Letter</option><option value="A3">A3</option></select></div>
          <div><label class="tool-label">الاتجاه</label>
          <select id="i2pOrient" class="tool-select"><option value="portrait">عمودي</option><option value="landscape">أفقي</option></select></div>
        </div>
        <div id="i2pProgress" hidden class="progress-wrap mt-4"><div class="progress-bar"><div class="progress-fill" id="i2pFill" style="width:0"></div></div><div class="progress-label">جاري التحويل...</div></div>
        <div class="tool-actions mt-4"><button id="i2pConvert" class="btn btn-primary" disabled>📄 تحويل إلى PDF</button></div>
      </div></div>
      <aside class="tool-sidebar"><div class="ad-container ad-rectangle"><div class="ad-placeholder">مساحة إعلانية 300×250</div></div></aside>
    </div>
  </div></section>
</main>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="/js/main.js"></script><script src="/js/tools/images-to-pdf.js"></script>
</body>
</html>
