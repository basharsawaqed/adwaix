<body>
<main id="main-content">
  <div class="container"><nav class="breadcrumbs"><a href="/" data-i18n="bc.home">الرئيسية</a><span class="sep">›</span><a href="/financial-tools/" data-i18n="bc.financial-tools">أدوات مالية</a><span class="sep">›</span><span class="current" data-i18n="tool.currency.bc">محول العملات</span></nav></div>
  <section class="tool-page"><div class="container">
    <div class="tool-header"><h1 data-i18n="tool.currency.title">محول العملات</h1><p data-i18n="tool.currency.desc">أسعار صرف محدثة يومياً. أدخل المبلغ واختر العملة.</p></div>
    <div class="tool-layout">
      <div class="tool-main"><div class="tool-box">
        <div style="margin-bottom:var(--sp-4)">
          <p class="tool-label" data-i18n="tool.currency.common">أزواج شائعة</p>
          <div style="display:flex;flex-wrap:wrap;gap:var(--sp-2)">
            <button data-pair="JOD-USD" class="btn btn-secondary btn-sm">JOD → USD</button>
            <button data-pair="JOD-EUR" class="btn btn-secondary btn-sm">JOD → EUR</button>
            <button data-pair="JOD-SAR" class="btn btn-secondary btn-sm">JOD → SAR</button>
            <button data-pair="USD-JOD" class="btn btn-secondary btn-sm">USD → JOD</button>
            <button data-pair="EUR-USD" class="btn btn-secondary btn-sm">EUR → USD</button>
          </div>
        </div>
        <div class="grid-3" style="gap:var(--sp-4);align-items:end;margin-bottom:var(--sp-4)">
          <div><label class="tool-label" data-i18n="tool.currency.from">من</label>
          <select id="ccFrom" class="tool-select w-full">
            <option value="JOD" selected>JOD - الدينار الأردني</option>
            <option value="USD">USD - الدولار الأمريكي</option>
            <option value="EUR">EUR - اليورو</option>
            <option value="GBP">GBP - الجنيه الإسترليني</option>
            <option value="SAR">SAR - الريال السعودي</option>
            <option value="AED">AED - الدرهم الإماراتي</option>
            <option value="KWD">KWD - الدينار الكويتي</option>
            <option value="EGP">EGP - الجنيه المصري</option>
            <option value="QAR">QAR - الريال القطري</option>
            <option value="TRY">TRY - الليرة التركية</option>
            <option value="CNY">CNY - اليوان الصيني</option>
            <option value="JPY">JPY - الين الياباني</option>
          </select></div>
          <div style="text-align:center"><button id="ccSwap" class="btn btn-secondary" aria-label="تبديل العملتين">⇌</button></div>
          <div><label class="tool-label" data-i18n="tool.currency.to">إلى</label>
          <select id="ccTo" class="tool-select w-full">
            <option value="USD" selected>USD - الدولار الأمريكي</option>
            <option value="JOD">JOD - الدينار الأردني</option>
            <option value="EUR">EUR - اليورو</option>
            <option value="GBP">GBP - الجنيه الإسترليني</option>
            <option value="SAR">SAR - الريال السعودي</option>
            <option value="AED">AED - الدرهم الإماراتي</option>
            <option value="KWD">KWD - الدينار الكويتي</option>
            <option value="EGP">EGP - الجنيه المصري</option>
            <option value="QAR">QAR - الريال القطري</option>
            <option value="TRY">TRY - الليرة التركية</option>
            <option value="CNY">CNY - اليوان الصيني</option>
            <option value="JPY">JPY - الين الياباني</option>
          </select></div>
        </div>
        <div style="margin-bottom:var(--sp-4)"><label class="tool-label" data-i18n="tool.currency.amount">المبلغ</label><input type="number" id="ccAmount" class="tool-input" value="1" min="0" step="any"></div>
        <button id="ccConvert" class="btn btn-primary btn-lg" data-i18n="tool.currency.btn">💱 تحويل</button>
        <div style="margin-top:var(--sp-6);padding:var(--sp-6);background:var(--bg-section);border-radius:var(--radius-md)">
          <div id="ccResult" style="font-size:1.5rem;font-weight:800;color:var(--primary);margin-bottom:var(--sp-2)" data-i18n="tool.currency.prompt">أدخل مبلغاً واضغط تحويل</div>
          <div id="ccRate" style="font-size:.875rem;color:var(--text-muted)"></div>
          <div id="ccUpdated" style="font-size:.8rem;color:var(--text-light);margin-top:var(--sp-1)"></div>
        </div>
      </div></div>
      <aside class="tool-sidebar"><div class="ad-container ad-rectangle"><div class="ad-placeholder"></div></div></aside>
    </div>
  </div></section>
</main>
<script src="/js/main.js"></script><script src="/js/tools/currency-converter.js"></script>
