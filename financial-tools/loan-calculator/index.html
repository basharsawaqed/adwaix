  <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"كيف يتم حساب القسط الشهري؟","acceptedAnswer":{"@type":"Answer","text":"يُحسب القسط الشهري باستخدام معادلة الإهلاك المتساوي: القسط = (المبلغ × الفائدة الشهرية) ÷ (1 - (1 + الفائدة الشهرية)^(-عدد الأشهر))."}},{"@type":"Question","name":"ما هو جدول الإهلاك؟","acceptedAnswer":{"@type":"Answer","text":"جدول الإهلاك يوضح تفاصيل كل دفعة شهرية: الجزء المخصص لسداد أصل القرض والجزء المخصص للفائدة والرصيد المتبقي."}},{"@type":"Question","name":"هل يدعم الفائدة المتناقصة؟","acceptedAnswer":{"@type":"Answer","text":"نعم، الحاسبة تستخدم طريقة الفائدة المتناقصة وهي الأكثر شيوعاً في البنوك."}},{"@type":"Question","name":"هل يمكن استخدامها لقروض السيارات والعقارات؟","acceptedAnswer":{"@type":"Answer","text":"نعم، الحاسبة تصلح لجميع أنواع القروض: الشخصية والسيارات والعقارات وغيرها."}},{"@type":"Question","name":"هل البيانات المدخلة محفوظة؟","acceptedAnswer":{"@type":"Answer","text":"لا، جميع الحسابات تتم محلياً في متصفحك ولا يتم حفظ أي بيانات."}}]}</script>

<body>
<main id="main-content">
  <div class="container"><nav class="breadcrumbs"><a href="/" data-i18n="bc.home">الرئيسية</a><span class="sep">›</span><a href="/financial-tools/" data-i18n="bc.financial-tools">أدوات مالية</a><span class="sep">›</span><span class="current" data-i18n="tool.loan.bc">حاسبة القروض</span></nav></div>
  <section class="tool-page"><div class="container">
    <div class="tool-header"><h1 data-i18n="tool.loan.title">حاسبة القروض البنكية</h1><p data-i18n="tool.loan.desc">أدخل مبلغ القرض وسعر الفائدة والمدة للحصول على القسط الشهري وجدول السداد الكامل.</p></div>
    <div class="tool-layout">
      <div class="tool-main"><div class="tool-box">
        <div class="grid-3" style="gap:var(--sp-4);margin-bottom:var(--sp-4)">
          <div><label class="tool-label" data-i18n="tool.loan.amount">مبلغ القرض (د.أ)</label><input type="number" id="lcAmount" class="tool-input" placeholder="10000" min="0"></div>
          <div><label class="tool-label" data-i18n="tool.loan.rate">سعر الفائدة السنوي (%)</label><input type="number" id="lcRate" class="tool-input" placeholder="8.5" step="0.1" min="0"></div>
          <div style="display:flex;gap:8px;align-items:flex-end">
            <div style="flex:1"><label class="tool-label" data-i18n="tool.loan.term">مدة القرض</label><input type="number" id="lcTerm" class="tool-input" placeholder="36" min="1"></div>
            <select id="lcTermUnit" class="tool-select"><option value="months" data-i18n="tool.loan.months">شهر</option><option value="years" data-i18n="tool.loan.years">سنة</option></select>
          </div>
        </div>
        <button id="lcCalc" class="btn btn-primary" data-i18n="tool.loan.btn">🔢 احتساب</button>
        <div id="lcResult" hidden style="margin-top:var(--sp-6)">
          <div class="stats-grid">
            <div class="stat-box"><span class="num" id="lcMonthly">-</span><div class="lbl" data-i18n="tool.loan.monthly">القسط الشهري</div></div>
            <div class="stat-box"><span class="num" id="lcTotal">-</span><div class="lbl" data-i18n="tool.loan.total">إجمالي الدفعات</div></div>
            <div class="stat-box"><span class="num" id="lcInterest" style="color:var(--error)">-</span><div class="lbl" data-i18n="tool.loan.interest">إجمالي الفائدة</div></div>
          </div>
          <h3 style="margin-top:var(--sp-6);margin-bottom:var(--sp-3)" data-i18n="tool.loan.schedule">جدول الإهلاك</h3>
          <div style="overflow-x:auto;max-height:400px;overflow-y:auto">
            <table class="data-table">
              <thead><tr><th data-i18n="tool.loan.th-month">الشهر</th><th data-i18n="tool.loan.th-pay">القسط</th><th data-i18n="tool.loan.th-princ">أصل الدين</th><th data-i18n="tool.loan.th-int">الفائدة</th><th data-i18n="tool.loan.th-bal">الرصيد</th></tr></thead>
              <tbody id="lcBody"></tbody>
            </table>
          </div>
        </div>
      </div></div>
      <aside class="tool-sidebar"><div class="ad-container ad-rectangle"><div class="ad-placeholder">مساحة إعلانية 300×250</div></div></aside>
    </div>
  </div></section>
</main>
<script src="/js/main.js"></script><script src="/js/tools/loan-calculator.js"></script>
</body>
</html>
